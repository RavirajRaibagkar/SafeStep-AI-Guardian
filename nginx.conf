events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:5000;
    }
    upstream guardian {
        server web-guardian:80;
    }
    upstream police {
        server web-police:80;
    }

    server {
        listen 80;
        server_name safestep.app localhost;

        # API backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Socket.IO
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static uploads
        location /uploads/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Guardian dashboard
        location /guardian/ {
            proxy_pass http://guardian/;
            proxy_set_header Host $host;
        }

        # Police admin dashboard
        location /police/ {
            proxy_pass http://police/;
            proxy_set_header Host $host;
        }

        # Case tracking (public)
        location /track/ {
            proxy_pass http://guardian/;
            proxy_set_header Host $host;
        }

        location /case/ {
            proxy_pass http://police/;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://guardian/;
            proxy_set_header Host $host;
        }
    }
}
